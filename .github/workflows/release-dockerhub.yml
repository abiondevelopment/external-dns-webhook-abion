name: Release Docker image

on:
  push:
    tags:
      - "*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dockerhub:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAME: abiondevelopment/external-dns-webhook-abion
      IMAGE_TAG: ${{ github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release tag
        run: |
          if [[ ! "${IMAGE_TAG}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match X.Y.Z. Got: ${IMAGE_TAG}"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

      - name: Run static analysis
        run: make static-analysis

      - name: Build Docker image
        run: make build IMAGE_NAME="${IMAGE_NAME}" IMAGE_TAG="${IMAGE_TAG}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: make push IMAGE_NAME="${IMAGE_NAME}" IMAGE_TAG="${IMAGE_TAG}"

      - name: Log out from Docker Hub
        if: always()
        run: docker logout
